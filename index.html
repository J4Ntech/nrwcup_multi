<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>OBS Overlay</title>

<style>
body {
  background: black;
  color: white;
  font-size: 40px;
  font-family: Arial;
}
.container {
  padding: 20px;
}
.item {
  margin: 10px 0;
}
</style>
</head>

<body>
<div class="container" id="container"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxjVaeXvfNr8bqodEWDjgzOccaqxSPATRbFgyuzY2qZpIuEJpi6jRP9Ao5_xP2tU5iq/exec";

async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + new Date().getTime());
    const data = await res.json();

    const container = document.getElementById("container");

    container.innerHTML = `
      <div> ${data.B4} ${data.C4}</div>
      <div> ${data.B6} ${data.C6}</div>
      <div> ${data.B8} ${data.C8}</div>

      <div> ${data.E4} ${data.F4}</div>
      <div> ${data.E6} ${data.F6}</div>
      <div> ${data.E8} ${data.F8}</div>

      <div> ${data.B17} ${data.C17}</div>
      <div> ${data.B19} ${data.C19}</div>
      <div> ${data.B21} ${data.C21}</div>

      <div> ${data.E17} ${data.F17}</div>
      <div> ${data.E19} ${data.F19}</div>
      <div> ${data.E21} ${data.F21}</div>
    `;

  } catch (err) {
    console.log("Fehler:", err);
  }
}

loadData();
setInterval(loadData, 2000);
</script>

</body>
</html>
