<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>OBS Overlay</title>

<style>
body {
  background: black;
  color: white;
  font-size: 40px;
  font-family: Arial;
}
.container {
  padding: 20px;
}
.item {
  margin: 10px 0;
}
</style>
</head>

<body>
<div class="container" id="container"></div>

<script>
const API_URL = "https://script.google.com/macros/s/DEINE_ID/exec";

async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + new Date().getTime());
    const data = await res.json();

    const container = document.getElementById("container");

    container.innerHTML = `
      <div>Set 1: ${data.B4} | ${data.C4}</div>
      <div>Set 2: ${data.B7} | ${data.C7}</div>

      <div>Match 1: ${data.B17} | ${data.C17}</div>
      <div>Match 2: ${data.B18} | ${data.C18}</div>
      <div>Match 3: ${data.B19}</div>

      <div>Side A: ${data.E4} | ${data.F4}</div>
      <div>Side B: ${data.E7} | ${data.F7}</div>

      <div>Match A: ${data.E17} | ${data.F17}</div>
      <div>Match B: ${data.E19} | ${data.F19}</div>
    `;

  } catch (err) {
    console.log("Fehler:", err);
  }
}

loadData();
setInterval(loadData, 2000);
</script>

</body>
</html>
