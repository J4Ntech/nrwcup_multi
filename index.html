<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>OBS Overlay</title>

<style>
body {
  background: black;
  color: white;
  font-size: 40px;
  font-family: Monospace;
}
.container {
  padding: 20px;
}
.item {
  margin: 10px 0;
}
</style>
</head>

<body>
<div class="container" id="container"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw0W5PnmZDVZWa3R__ZlnJ5mfi5Mhc0nddjLM8mEJ2SFCSTD0bJ2_DLPdPncaVnVqZo/exec";

async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + new Date().getTime());
    const data = await res.json();

    const container = document.getElementById("container");

    container.innerHTML = `
      <div> ${data.B4} </div>
      <div> ${data.C4} </div>
      <div> ${data.B6} </div>
      <div> ${data.C6}  </div>
      <div> ${data.B8} </div>
      <div> ${data.C8} </div>

      <div> ${data.E4} </div>
      <div> ${data.F4} </div>
      <div> ${data.E6} </div>
      <div> ${data.F6} </div>
      <div> ${data.E8} </div>
      <div> ${data.F8} </div>

      <div> ${data.B17} </div>
      <div> ${data.C17} </div>
      <div> ${data.B19} </div>
      <div> ${data.C19} </div>
      <div> ${data.B21} </div>
      <div> ${data.C21} </div>

      <div> ${data.E17} </div>
      <div> ${data.F17} </div>
      <div> ${data.E19} </div>
      <div> ${data.F19} </div>
      <div> ${data.E21} </div>
      <div> ${data.F21} </div>
    `;

  } catch (err) {
    console.log("Fehler:", err);
  }
}

loadData();
setInterval(loadData, 2000);
</script>

</body>
</html>
