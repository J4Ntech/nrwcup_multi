<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>OBS Overlay</title>

<style>
body {
  background: transparent;
  color: white;
  font-size: 40px;
  font-family: Arial;
}
.container {
  padding: 20px;
}
.item {
  margin: 10px 0;
}
</style>
</head>

<body>
<div class="container" id="container"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz5nzebd2oijgNM6qbwF1gcv_eZMm-IWNYEIndVIv2ztFjW1oD6lGZqivPKUSVNFrNL/exec";

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const container = document.getElementById("container");
    container.innerHTML = "";

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "item";
      div.textContent = `${item.name}: ${item.value}`;
      container.appendChild(div);
    });

  } catch (err) {
    console.log("Fehler:", err);
  }
}

loadData();
setInterval(loadData, 2000); // alle 2 Sekunden
</script>

</body>
</html>
